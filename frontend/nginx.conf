server {
    listen 5173;
    server_name localhost;

    # 1. 处理前端路由 (Vue Router history模式)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # 防止刷新 404
        try_files $uri $uri/ /index.html;

        # index.html 禁止缓存，确保用户能拿到最新版本
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 带 hash 的 JS/CSS/图片资源 - 允许长期缓存（内容变化时文件名会变）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 2. 反向代理后端 API (解决跨域)
    # 假设前端请求是 /api/v1/... -> 转发给后端
    location ^~ /api/ {
        # 将请求转发到宿主机或指定后端，默认指向 host.docker.internal:7800
        # 如需修改，请重建镜像前修改此处或在 docker 层添加对应的 hosts 映射
        proxy_pass http://host.docker.internal:7800/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
